<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Aurora Logo - Transparent Background -->
  
  <!-- Outer Glow Ring -->
  <circle cx="200" cy="200" r="190" fill="url(#auroraGlow)" opacity="0.3"/>
  
  <!-- Main Aurora Ring Gradient -->
  <defs>
    <linearGradient id="auroraGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    
    <linearGradient id="auroraGradient2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="50%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    
    <linearGradient id="auroraGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Aurora Wave/Band 1 -->
  <path d="M200 40 C300 40 360 100 360 200 C360 300 300 360 200 360 C100 360 40 300 40 200 C40 100 100 40 200 40 Z" 
        stroke="url(#auroraGradient1)" 
        stroke-width="12" 
        fill="none"
        opacity="0.9"
        filter="url(#glow)"/>
  
  <!-- Aurora Wave/Band 2 - Inner -->
  <path d="M200 70 C280 70 330 120 330 200 C330 280 280 330 200 330 C120 330 70 280 70 200 C70 120 120 70 200 70 Z" 
        stroke="url(#auroraGradient2)" 
        stroke-width="8" 
        fill="none"
        opacity="0.7"/>
  
  <!-- Northern Lights Effect - Curved Lines -->
  <path d="M120 140 Q200 100 280 140" stroke="#06B6D4" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M110 180 Q200 130 290 180" stroke="#3B82F6" stroke-width="2.5" fill="none" opacity="0.5"/>
  <path d="M100 220 Q200 160 300 220" stroke="#6366F1" stroke-width="2" fill="none" opacity="0.4"/>
  
  <!-- Center Star/Sparkle -->
  <g filter="url(#glow)">
    <circle cx="200" cy="200" r="8" fill="#FFFFFF"/>
    <path d="M200 175 L200 225 M175 200 L225 200" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <path d="M182 182 L218 218 M182 218 L218 182" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  </g>
  
  <!-- Orbiting Dots -->
  <circle cx="200" cy="60" r="4" fill="#7C3AED" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="200" r="3" fill="#06B6D4" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="340" r="3.5" fill="#3B82F6" opacity="0.75">
    <animate attributeName="opacity" values="0.75;0.25;0.75" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="200" r="3" fill="#8B5CF6" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.3s" repeatCount="indefinite"/>
  </circle>
</svg>

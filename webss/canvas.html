<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Database Schema Canvas – Interactive ER Diagram</title>
    <!-- vis-network styles and script -->
    <script
      type="text/javascript"
      src="https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.js"

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .toolbar {
        background: #1e293b;
        color: white;
        padding: 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
        z-index: 10;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }
      .toolbar h1 {
        font-size: 1.3rem;
        font-weight: 500;
      }
      .toolbar button {
        background: #3b82f6;
        border: none;
        padding: 6px 14px;
        border-radius: 30px;
        color: white;
        cursor: pointer;
        font-size: 0.8rem;
        transition: background 0.2s;
      }
      .toolbar button:hover {
        background: #2563eb;
      }
      .toolbar a {
        display: inline-block;
        background: linear-gradient(135deg, #10b981, #059669);
        color: white;
        text-decoration: none;
        padding: 6px 14px;
        border-radius: 30px;
        font-size: 0.8rem;
        font-weight: 500;
        transition: all 0.2s;
        box-shadow: 0 2px 6px rgba(16, 185, 129, 0.3);
      }
      .toolbar a:hover {
        background: linear-gradient(135deg, #059669, #047857);
        transform: translateY(-1px);
        box-shadow: 0 4px 10px rgba(16, 185, 129, 0.4);
      }
      .legend {
        background: rgba(0, 0, 0, 0.7);
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 10px 15px;
        border-radius: 12px;
        color: white;
        font-size: 0.7rem;
        backdrop-filter: blur(4px);
        z-index: 20;
        pointer-events: none;
      }
      .legend span {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 2px;
        margin-right: 6px;
      }
      #network {
        width: 100%;
        height: 100%;
        background: #f8fafc;
        flex: 1;
      }
      .node-detail {
        position: fixed;
        top: 80px;
        right: 20px;
        width: 280px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
        padding: 15px;
        display: none;
        z-index: 30;
        border-left: 5px solid #3b82f6;
        pointer-events: auto;
      }
      .node-detail h4 {
        margin-bottom: 8px;
        color: #0f172a;
      }
      .node-detail ul {
        margin-left: 18px;
        font-size: 0.8rem;
        color: #334155;
      }
      .node-detail button {
        margin-top: 10px;
        background: #e2e8f0;
        border: none;
        padding: 4px 12px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.7rem;
      }
      .close-detail {
        float: right;
        background: none;
        border: none;
        font-size: 1.2rem;
        cursor: pointer;
        color: #64748b;
      }
    </style>
  </head>

        <a href="index.html">📋 Schema Explorer</a>
      </div>
    </div>
    <div id="network"></div>

      <button

          from: "health_appointments",
          to: "health_doctor_profiles",
          label: "doctor_id",
        },
        {
          from: "health_appointments",
          to: "health_patient_profiles",
          label: "patient_id",
        },
        { from: "freelancer_profiles", to: "users", label: "user_id" },
        { from: "factory_production_logs", to: "sellers", label: "factory_id" },
        {
          from: "factory_production_logs",
          to: "products",
          label: "product_id",
        },
        { from: "factory_quotes", to: "sellers", label: "seller_id" },
        { from: "factory_quotes", to: "sellers", label: "factory_id" },
        { from: "cod_collections", to: "orders", label: "order_id" },
        {
          from: "cod_collections",
          to: "delivery_profiles",
          label: "delivery_id",
        },
        { from: "calls", to: "conversations", label: "conversation_id" },
        { from: "calls", to: "users", label: "caller_id" },
        { from: "calls", to: "users", label: "callee_id" },
      ];

      // Build nodes array for vis-network
      const nodes = tables.map((t) => ({
        id: t.id,
        label: t.label,
        title: `${t.label}\n${t.columns.slice(0, 4).join("\n")}${t.columns.length > 4 ? "…" : ""}`,
        group: t.group,
        font: { size: 14, face: "Segoe UI" },
        shape: "box",
        color: {
          background: "#ffffff",
          border: "#3b82f6",
          highlight: { background: "#e0e7ff", border: "#2563eb" },
        },
        margin: 10,
        widthConstraint: { minimum: 100, maximum: 180 },
      }));

      // Build edges
      const networkEdges = edges.map((e) => ({
        from: e.from,
        to: e.to,
        label: e.label,
        arrows: { to: { enabled: true, scaleFactor: 0.8 } },
        color: { color: "#eab308", highlight: "#f59e0b" },
        font: { size: 10, align: "middle" },
        smooth: { type: "curvedCW", roundness: 0.2 },
      }));

      // ------------------------------------------------------------------
      // 3. Render network
      // ------------------------------------------------------------------
      const container = document.getElementById("network");
      const data = {
        nodes: new vis.DataSet(nodes),
        edges: new vis.DataSet(networkEdges),
      };
      const options = {
        nodes: { shape: "box", margin: 10, widthConstraint: { minimum: 120 } },
        edges: { smooth: true, arrows: { to: true }, font: { size: 10 } },
        physics: {
          enabled: true,
          stabilization: true,
          solver: "forceAtlas2Based",
        },
        interaction: {
          hover: true,
          tooltipDelay: 200,
          zoomView: true,
          dragView: true,
        },
        layout: { improvedLayout: true },
      };
      const network = new vis.Network(container, data, options);

      // Fit and reset buttons
      document
        .getElementById("fitBtn")
        .addEventListener("click", () => network.fit());
      document.getElementById("resetBtn").addEventListener("click", () => {
        network.setOptions({ physics: true });
        network.fit();
        setTimeout(() => network.setOptions({ physics: true }), 500);
      });

      // Click on node: show column details
      network.on("click", function (params) {
        if (params.nodes.length > 0) {
          const nodeId = params.nodes[0];
          const table = tables.find((t) => t.id === nodeId);
          if (table) {
            document.getElementById("detailTitle").innerText =
              `📋 ${table.label}`;
            const colList = table.columns
              .map((col) => `<li>${col}</li>`)
              .join("");
            document.getElementById("detailColumns").innerHTML =
              `<ul>${colList}</ul>`;
            document.getElementById("nodeDetail").style.display = "block";
          }
        } else {
          // optional: hide on background click? we keep open until close button
        }
      });

      // Prevent detail from closing when clicking inside
      document
        .getElementById("nodeDetail")
        .addEventListener("click", (e) => e.stopPropagation());
    </script>
  </body>
</html>
